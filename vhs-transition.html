<!-- ═══ VHS PAGE TRANSITION ═══ -->
<style>
#vhs-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 999999;
  pointer-events: none;
  opacity: 0;
  background: #000;
}
#vhs-overlay.active {
  opacity: 1;
  pointer-events: all;
}
#vhs-canvas {
  width: 100%; height: 100%;
  display: block;
  image-rendering: pixelated;
}
</style>

<div id="vhs-overlay">
  <canvas id="vhs-canvas"></canvas>
</div>

<script>
(function() {
  var overlay = document.getElementById('vhs-overlay');
  var canvas = document.getElementById('vhs-canvas');
  var ctx = canvas.getContext('2d');
  var animFrame = null;

  // Render at low res for speed — scale up with CSS pixelated
  var SCALE = 4;

  function resizeCanvas() {
    canvas.width = Math.ceil(window.innerWidth / SCALE);
    canvas.height = Math.ceil(window.innerHeight / SCALE);
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function drawStatic() {
    var w = canvas.width;
    var h = canvas.height;
    var imgData = ctx.createImageData(w, h);
    var data = imgData.data;
    var len = data.length;

    for (var i = 0; i < len; i += 4) {
      var v = (Math.random() * 255) | 0;
      data[i] = v;
      data[i + 1] = v;
      data[i + 2] = v;
      data[i + 3] = 255;
    }

    ctx.putImageData(imgData, 0, 0);

    // Tracking line
    var bandY = (Date.now() * 0.05 % h) | 0;
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(0, bandY, w, 2);

    animFrame = requestAnimationFrame(drawStatic);
  }

  function playStaticSound(ms) {
    try {
      var ac = new (window.AudioContext || window.webkitAudioContext)();
      var dur = ms / 1000;
      var sr = ac.sampleRate;
      var buf = ac.createBuffer(1, (sr * dur) | 0, sr);
      var ch = buf.getChannelData(0);
      for (var i = 0; i < ch.length; i++) ch[i] = (Math.random() * 2 - 1) * 0.15;
      // Fade edges
      var fade = Math.min(ch.length, (sr * 0.01) | 0);
      for (var f = 0; f < fade; f++) { ch[f] *= f / fade; ch[ch.length - 1 - f] *= f / fade; }
      var src = ac.createBufferSource();
      src.buffer = buf;
      src.connect(ac.destination);
      src.start();
    } catch(e) {}
  }

  function showStatic() {
    resizeCanvas();
    overlay.classList.add('active');
    drawStatic();
  }

  function hideStatic() {
    if (animFrame) cancelAnimationFrame(animFrame);
    animFrame = null;
    overlay.classList.remove('active');
  }

  // Intercept internal links
  document.addEventListener('click', function(e) {
    var link = e.target.closest('a');
    if (!link) return;
    var href = link.getAttribute('href');
    if (!href || href.charAt(0) !== '/' || link.target === '_blank') return;

    e.preventDefault();
    sessionStorage.setItem('vhs-arriving', '1');
    showStatic();
    playStaticSound(200);

    setTimeout(function() {
      window.location.href = href;
    }, 200);
  });

  // Arriving page
  if (sessionStorage.getItem('vhs-arriving') === '1') {
    sessionStorage.removeItem('vhs-arriving');
    showStatic();
    playStaticSound(150);
    setTimeout(hideStatic, 150);
  }

})();
</script>
