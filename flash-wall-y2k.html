<!-- SVG filter for bubbly text -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <filter id="inflate-flash" x="-15%" y="-15%" width="130%" height="130%">
      <feMorphology operator="dilate" radius="1.5" in="SourceAlpha" result="fat"/>
      <feGaussianBlur in="fat" stdDeviation="5" result="bump"/>
      <feSpecularLighting in="bump" specularConstant="2.5" specularExponent="22"
          lighting-color="rgba(255,255,255,0.95)" surfaceScale="6" result="spec">
        <fePointLight x="100" y="-50" z="250"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in" result="specClipped"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="specClipped"/>
      </feMerge>
    </filter>
  </defs>
</svg>

    content: '';

  }

  @media (max-width: 480px) {
    .flash-card { max-width: 160px; }
    .flash-img { height: 140px; }
  }
</style>

  var rotations = [-3, 4, -2, 5, -4, 1, -5, 3, -1, 2, -3, 4];

  var grid = document.getElementById('flash-grid');
  if (!grid) return;

  cards.forEach(function(card, i) {
    var rot = rotations[i];
    var div = document.createElement('div');
    div.className = 'flash-card';
    div.style.transform = 'rotate(' + rot + 'deg)';

    div.innerHTML =
      '<div class="thumbtack"></div>' +
      '<div class="flash-img" style="background:' + card.color + ';">FLASH #' + card.id + '</div>' +
      '<div class="flash-price">' + card.price + '</div>' +
      '<div class="flash-badge ' + card.status + '">' + card.status.toUpperCase() + '</div>';

    grid.appendChild(div);
  });

  /* ── Clock ── */
  var clockEl = document.getElementById('fw-clock');
  if (!clockEl) return;
  function tick() {
    var now = new Date();
    var h = now.getHours();
    var m = String(now.getMinutes()).padStart(2, '0');
    var ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    clockEl.textContent = h + ':' + m + ' ' + ampm;
  }
  tick();
  setInterval(tick, 30000);
})();
</script>
