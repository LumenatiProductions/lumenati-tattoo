<!-- ─── UNDER CONSTRUCTION OVERLAY ─── -->
<!-- Drop this at the top of any artist bedroom page -->

<style>
  .construction-banner {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 9998;
    background: repeating-linear-gradient(
      -45deg,
      #FFD700 0px,
      #FFD700 20px,
      #000 20px,
      #000 40px
    );
    padding: 6px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.6);
    max-width: 90vw;
  }

  .construction-inner {
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    padding: 32px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
  }

  .construction-text {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: #FFD700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    animation: construction-blink 1.5s step-end infinite;
  }

  @keyframes construction-blink {
    0%, 70% { opacity: 1; }
    71%, 100% { opacity: 0; }
  }

  .construction-sub {
    font-family: 'VT323', monospace;
    font-size: 22px;
    color: rgba(255,255,255,0.5);
  }

  @media (max-width: 640px) {
    .construction-text { font-size: 8px; }
    .construction-sub { font-size: 13px; }
    .construction-inner { padding: 8px 12px; }
  }
</style>

<div class="construction-banner">
  <div class="construction-inner">
    <span class="construction-text">// UNDER CONSTRUCTION //</span>
    <span class="construction-sub">setting up the room -- check back soon</span>
  </div>
</div>
