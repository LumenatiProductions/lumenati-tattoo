<script>
(function() {
  var player = document.getElementById('winamp-player');
  var audio = document.getElementById('winamp-audio');
  var playBtn = document.getElementById('winamp-play');
  var pauseBtn = document.getElementById('winamp-pause');
  var stopBtn = document.getElementById('winamp-stop');
  var prevBtn = document.getElementById('winamp-prev');
  var nextBtn = document.getElementById('winamp-next');
  var closeBtn = document.getElementById('winamp-close');
  var minBtn = document.getElementById('winamp-minimize');
  var titlebar = document.getElementById('winamp-titlebar');
  var elapsed = document.getElementById('winamp-elapsed');
  var seekFill = document.getElementById('winamp-seek-fill');
  var seekThumb = document.getElementById('winamp-seek-thumb');
  var seekBar = document.getElementById('winamp-seek-bar');
  var bars = document.querySelectorAll('.winamp-eq-bar');
  var volTrack = document.getElementById('winamp-volume-track');
  var volFill = document.getElementById('winamp-volume-fill');
  var volThumb = document.getElementById('winamp-volume-thumb');

  var isPlaying = false;
  var eqInterval = null;

  // ── FORMAT TIME ──
  function formatTime(s) {
    if (isNaN(s)) return '00:00';
    var m = Math.floor(s / 60);
    var sec = Math.floor(s % 60);
    return (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  // ── TIME UPDATE ──
  audio.addEventListener('timeupdate', function() {
    elapsed.textContent = formatTime(audio.currentTime);
    if (audio.duration && !isNaN(audio.duration)) {
      var pct = (audio.currentTime / audio.duration) * 100;
      seekFill.style.width = pct + '%';
      seekThumb.style.left = pct + '%';
    }
  });

  audio.addEventListener('ended', function() {
    doStop();
  });

  // ── SEEK ──
  seekBar.addEventListener('click', function(e) {
    if (!audio.duration || isNaN(audio.duration)) return;
    var rect = seekBar.getBoundingClientRect();
    var pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  });

  // ── VOLUME ──
  function setVolume(pct) {
    pct = Math.max(0, Math.min(1, pct));
    volFill.style.width = (pct * 100) + '%';
    volThumb.style.left = (pct * 100) + '%';
    audio.volume = pct;
  }

  volTrack.addEventListener('click', function(e) {
    var rect = volTrack.getBoundingClientRect();
    setVolume((e.clientX - rect.left) / rect.width);
  });

  // ── EQ VISUALIZER ──
  function startEQ() {
    if (eqInterval) return;
    eqInterval = setInterval(function() {
      for (var i = 0; i < bars.length; i++) {
        var h = Math.random() * 18 + 2;
        bars[i].style.height = h + 'px';
      }
    }, 100);
  }

  function stopEQ() {
    if (eqInterval) {
      clearInterval(eqInterval);
      eqInterval = null;
    }
    for (var i = 0; i < bars.length; i++) {
      bars[i].style.height = '2px';
    }
  }

  // ── TRANSPORT ──
  function clearActive() {
    playBtn.classList.remove('winamp-active');
    pauseBtn.classList.remove('winamp-active');
    stopBtn.classList.remove('winamp-active');
  }

  function doPlay() {
    var p = audio.play();
    if (p && p.catch) p.catch(function() {});
    isPlaying = true;
    clearActive();
    playBtn.classList.add('winamp-active');
    startEQ();
  }

  function doPause() {
    audio.pause();
    isPlaying = false;
    clearActive();
    pauseBtn.classList.add('winamp-active');
    stopEQ();
  }

  function doStop() {
    audio.pause();
    audio.currentTime = 0;
    isPlaying = false;
    clearActive();
    stopBtn.classList.add('winamp-active');
    stopEQ();
    elapsed.textContent = '00:00';
    seekFill.style.width = '0%';
    seekThumb.style.left = '0%';
  }

  playBtn.addEventListener('click', doPlay);
  pauseBtn.addEventListener('click', doPause);
  stopBtn.addEventListener('click', doStop);

  prevBtn.addEventListener('click', function() {
    audio.currentTime = 0;
    if (isPlaying) doPlay();
  });

  nextBtn.addEventListener('click', function() {
    audio.currentTime = 0;
    if (isPlaying) doPlay();
  });

  // ── SHADE / CLOSE ──
  closeBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    player.classList.toggle('winamp-shaded');
  });

  minBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    player.classList.toggle('winamp-shaded');
  });

  // ── DRAG ──
  var isDragging = false;
  var dragOffX = 0, dragOffY = 0;

  titlebar.addEventListener('mousedown', function(e) {
    if (e.target.tagName === 'BUTTON') return;
    isDragging = true;
    var rect = player.getBoundingClientRect();
    dragOffX = e.clientX - rect.left;
    dragOffY = e.clientY - rect.top;
    player.style.transition = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    var x = e.clientX - dragOffX;
    var y = e.clientY - dragOffY;
    // Clamp to viewport
    x = Math.max(0, Math.min(window.innerWidth - player.offsetWidth, x));
    y = Math.max(0, Math.min(window.innerHeight - player.offsetHeight, y));
    player.style.left = x + 'px';
    player.style.top = y + 'px';
    player.style.right = 'auto';
    player.style.bottom = 'auto';
  });

  document.addEventListener('mouseup', function() {
    isDragging = false;
  });

  // Touch drag for mobile
  titlebar.addEventListener('touchstart', function(e) {
    if (e.target.tagName === 'BUTTON') return;
    isDragging = true;
    var rect = player.getBoundingClientRect();
    var touch = e.touches[0];
    dragOffX = touch.clientX - rect.left;
    dragOffY = touch.clientY - rect.top;
    player.style.transition = 'none';
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (!isDragging) return;
    var touch = e.touches[0];
    var x = touch.clientX - dragOffX;
    var y = touch.clientY - dragOffY;
    x = Math.max(0, Math.min(window.innerWidth - player.offsetWidth, x));
    y = Math.max(0, Math.min(window.innerHeight - player.offsetHeight, y));
    player.style.left = x + 'px';
    player.style.top = y + 'px';
    player.style.right = 'auto';
    player.style.bottom = 'auto';
  }, { passive: true });

  document.addEventListener('touchend', function() {
    isDragging = false;
  });

  // ── INIT ──
  setVolume(0.75);

})();
</script>

  }

  #clippy-bubble-text {
    font-size: 13px;
    line-height: 1.4;
    color: #000;
    margin-bottom: 12px;
  }

  #clippy-buttons {
    display: flex;
    gap: 8px;
  }

  #clippy-btn-book {
    background: #222;
    color: #fff;
    border: none;
    padding: 6px 14px;
    border-radius: 3px;
    font-size: 12px;
    cursor: pointer;
    text-decoration: none;
    font-weight: 600;
    transition: background 0.2s;
  }

  #clippy-btn-book:hover {
    background: #444;
    color: #fff;
  }

  #clippy-btn-dismiss {
    background: transparent;
    color: #555;
    border: 1px solid #999;
    padding: 6px 12px;
    border-radius: 3px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  #clippy-btn-dismiss:hover {
    background: #eee;
    color: #000;
  }

  #clippy-character {
    animation: clippy-bob 3s ease-in-out infinite;
    cursor: pointer;
  }

  #clippy-img {
    display: block;
    width: 100px;
    height: auto;
    filter: drop-shadow(1px 1px 0 rgba(0,0,0,0.1));
  }

  @keyframes clippy-bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }


  @media (max-width: 640px) {
    #clippy-container { left: 12px; }
    #clippy-character { transform-origin: bottom left; scale: 0.75; }
    #clippy-bubble { max-width: 180px; padding: 10px 12px; }
    #clippy-bubble-text { font-size: 12px; }
    #clippy-buttons { flex-direction: column; gap: 6px; }
    #clippy-btn-book, #clippy-btn-dismiss { text-align: center; }
  }
</style>

<script>
  (function() {
    if (sessionStorage.getItem('clippy-dismissed')) return;
    var container = document.getElementById('clippy-container');
    var dismissBtn = document.getElementById('clippy-btn-dismiss');
    setTimeout(function() {
      container.classList.add('clippy-visible');
    }, 3000);
    dismissBtn.addEventListener('click', function() {
      container.classList.remove('clippy-visible');
      container.classList.add('clippy-hiding');
      sessionStorage.setItem('clippy-dismissed', '1');
      setTimeout(function() { container.style.display = 'none'; }, 500);
    });
  })();
</script>

</body>
</html>
