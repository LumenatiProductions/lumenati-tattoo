<!--
  AIM Buddy List Widget
  Usage: Include this file's contents in your page, or embed via iframe.
  Position: fixed, left side, vertically centered. Hidden on mobile.
  To set an artist to "Away": change class="buddy online" to class="buddy away"
-->

<style>
  /* ============ AIM BUDDY LIST ============ */
  .aim-buddy-list {
    position: fixed;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 180px;
    font-family: Tahoma, Geneva, sans-serif;
    font-size: 11px;
    z-index: 9000;
    user-select: none;
  }

  @media (max-width: 768px) {
    .aim-buddy-list {
      display: none;
    }
  }

  /* Win98 window frame */
  .aim-window {
    border: 2px solid;
    border-color: #dfdfdf #404040 #404040 #dfdfdf;
    background: #c0c0c0;
    box-shadow: inset 1px 1px 0 #fff, inset -1px -1px 0 #808080;
  }

  /* Blue gradient titlebar */
  .aim-titlebar {
    background: linear-gradient(90deg, #000080, #1084d0);
    color: #fff;
    font-weight: bold;
    font-size: 11px;
    padding: 2px 3px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 18px;
    line-height: 18px;
  }

  .aim-titlebar-text {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    padding-left: 2px;
  }

  /* Titlebar buttons */
  .aim-titlebar-buttons {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
  }

  .aim-titlebar-btn {
    width: 16px;
    height: 14px;
    background: #c0c0c0;
    border: 1px solid;
    border-color: #dfdfdf #404040 #404040 #dfdfdf;
    box-shadow: inset 1px 1px 0 #fff, inset -1px -1px 0 #808080;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    font-weight: bold;
    color: #000;
    cursor: default;
    line-height: 1;
    padding: 0;
  }

  .aim-titlebar-btn:active {
    border-color: #404040 #dfdfdf #dfdfdf #404040;
    box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #fff;
  }

  /* AIM menu bar under titlebar */
  .aim-menubar {
    background: #c0c0c0;
    border-bottom: 1px solid #808080;
    padding: 1px 4px;
    font-size: 11px;
    color: #000;
    display: flex;
    gap: 8px;
  }

  .aim-menubar span {
    cursor: default;
  }

  .aim-menubar span:first-child {
    text-decoration: underline;
  }

  /* Buddy list body */
  .aim-body {
    background: #fff;
    border: 2px solid;
    border-color: #808080 #dfdfdf #dfdfdf #808080;
    box-shadow: inset 1px 1px 0 #404040, inset -1px -1px 0 #fff;
    margin: 3px;
    min-height: 120px;
    max-height: 260px;
    overflow-y: auto;
    overflow-x: hidden;
  }

  /* Scrollbar styling */
  .aim-body::-webkit-scrollbar {
    width: 16px;
  }

  .aim-body::-webkit-scrollbar-track {
    background: #c0c0c0;
    border-left: 1px solid #808080;
  }

  .aim-body::-webkit-scrollbar-thumb {
    background: #c0c0c0;
    border: 1px solid;
    border-color: #dfdfdf #404040 #404040 #dfdfdf;
    box-shadow: inset 1px 1px 0 #fff, inset -1px -1px 0 #808080;
  }

  /* Category header */
  .aim-category {
    padding: 2px 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 3px;
    font-weight: bold;
    color: #000;
    white-space: nowrap;
  }

  .aim-category:hover {
    background: none;
  }

  /* Expand/collapse triangle */
  .aim-triangle {
    display: inline-block;
    width: 0;
    height: 0;
    transition: none;
  }

  .aim-triangle.expanded {
    border-left: 5px solid transparent;
    border-right: 5px solid transparent;
    border-top: 6px solid #000;
    margin-top: 2px;
  }

  .aim-triangle.collapsed {
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    border-left: 6px solid #000;
    margin-left: 2px;
  }

  /* Buddy list entries */
  .aim-buddy-group {
    padding: 0;
  }

  .aim-buddy-group.hidden {
    display: none;
  }

  .buddy {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 1px 4px 1px 18px;
    cursor: pointer;
    text-decoration: none;
    color: #000;
    white-space: nowrap;
  }

  .buddy:hover {
    background: #0a246a;
    color: #fff;
  }

  .buddy:hover .buddy-name {
    color: #fff;
  }

  .buddy-name {
    color: #000;
    font-size: 11px;
  }

  /* Status dots */
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .buddy.online .status-dot {
    background: #00c000;
  }

  .buddy.away .status-dot {
    background: #d4b800;
  }

  /* Footer section */
  .aim-footer {
    padding: 3px 5px;
    font-size: 10px;
    color: #808080;
    border-top: 1px solid #808080;
    margin: 0 3px;
    background: #c0c0c0;
  }

  .aim-footer-line {
    line-height: 1.4;
  }

  /* Bottom button bar */
  .aim-button-bar {
    display: flex;
    gap: 4px;
    padding: 4px 6px 5px;
    justify-content: center;
  }

  .aim-btn {
    font-family: Tahoma, Geneva, sans-serif;
    font-size: 11px;
    padding: 2px 12px;
    background: #c0c0c0;
    border: 2px solid;
    border-color: #dfdfdf #404040 #404040 #dfdfdf;
    box-shadow: inset 1px 1px 0 #fff, inset -1px -1px 0 #808080;
    cursor: default;
    color: #000;
    outline: none;
  }

  .aim-btn:active {
    border-color: #404040 #dfdfdf #dfdfdf #404040;
    box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #fff;
    padding: 3px 11px 1px 13px;
  }
</style>

<div class="aim-buddy-list">
  <div class="aim-window">

    <!-- Titlebar -->
    <div class="aim-titlebar">
      <span class="aim-titlebar-text">Buddy List (6/6 online)</span>
      <div class="aim-titlebar-buttons">
        <div class="aim-titlebar-btn">_</div>
        <div class="aim-titlebar-btn">x</div>
      </div>
    </div>

    <!-- Menu bar -->
    <div class="aim-menubar">
      <span>My AIM</span>
      <span>People</span>
      <span>Help</span>
    </div>

    <!-- Buddy list body -->
    <div class="aim-body" id="aimBuddyBody">

      <!-- Category: The Crew -->
      <div class="aim-category" onclick="toggleCategory(this)">
        <span class="aim-triangle expanded"></span>
        The Crew (6)
      </div>
      <div class="aim-buddy-group">
        <a href="/jd-pruitt" class="buddy online">
          <span class="status-dot"></span>
          <span class="buddy-name">jd_pruitt</span>
        </a>
        <a href="/electric-elaine" class="buddy online">
          <span class="status-dot"></span>
          <span class="buddy-name">electric_elaine</span>
        </a>
        <a href="/shorty" class="buddy online">
          <span class="status-dot"></span>
          <span class="buddy-name">shortyadtr</span>
        </a>
        <a href="/king-kalypso" class="buddy online">
          <span class="status-dot"></span>
          <span class="buddy-name">king_kalypso</span>
        </a>
        <a href="/sam-durby" class="buddy online">
          <span class="status-dot"></span>
          <span class="buddy-name">sam_durby</span>
        </a>
        <a href="/puppie-pokes" class="buddy online">
          <span class="status-dot"></span>
          <span class="buddy-name">puppie_pokes</span>
        </a>
      </div>

    </div>

    <!-- Footer info -->
    <div class="aim-footer">
      <div class="aim-footer-line">Warning Level: 0%</div>
      <div class="aim-footer-line">Idle: 0 minutes</div>
    </div>

    <!-- Bottom buttons -->
    <div class="aim-button-bar">
      <button class="aim-btn">IM</button>
      <button class="aim-btn">Info</button>
    </div>

  </div>
</div>

<script>
  function toggleCategory(el) {
    var triangle = el.querySelector('.aim-triangle');
    var group = el.nextElementSibling;
    if (triangle.classList.contains('expanded')) {
      triangle.classList.remove('expanded');
      triangle.classList.add('collapsed');
      group.classList.add('hidden');
    } else {
      triangle.classList.remove('collapsed');
      triangle.classList.add('expanded');
      group.classList.remove('hidden');
    }
  }
</script>
