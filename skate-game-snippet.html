<!-- Hidden Game -->
<div id="jd-game-overlay" style="display:none;position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;flex-direction:column;">
  <div style="background:#ece9d8;border:2px solid;border-color:#fff #808080 #808080 #fff;box-shadow:3px 3px 0 rgba(0,0,0,0.3);max-width:95vw;">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:3px 4px;background:linear-gradient(180deg,#e05c2a 0%,#b84a20 100%);height:24px;">
      <span style="font-family:Tahoma,sans-serif;font-size:11px;font-weight:bold;color:#fff;text-shadow:1px 1px 0 rgba(0,0,0,0.3);">breakout.exe — JD's Arcade</span>
      <span style="font-family:Tahoma,sans-serif;font-size:11px;color:#fff;cursor:pointer;padding:0 4px;" onclick="document.getElementById('jd-game-overlay').style.display='none';window.skateRunning=false;">✕</span>
    </div>
    <div style="padding:4px;background:#ece9d8;">
      <canvas id="jd-skate-canvas" width="400" height="320" style="display:block;border:1px solid;border-color:#808080 #fff #fff #808080;background:#000;"></canvas>
    </div>
    <div style="padding:4px 8px;background:#ece9d8;border-top:1px solid #aca899;font-family:Tahoma,sans-serif;font-size:10px;color:#444;display:flex;justify-content:space-between;">
      <span>Score: <span id="jd-br-score">0</span></span>
      <span>Lives: <span id="jd-br-lives">3</span></span>
      <span>SPACE to ollie</span>
    </div>
  </div>
</div>

<script>
(function() {
  var canvas = document.getElementById('jd-skate-canvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = 400, H = 320;

  // Game state
  var score, lives, speed, frame, gameOver, started;
  var player, ground, obstacles, collectibles, rails, particles, buildings;
  var GRAVITY = 0.6;
  var GROUND_Y = 270;
  var scrollX = 0;

  // Colors
  var ORANGE = '#e05c2a';
  var PINK = '#FF1493';
  var LIME = '#7FFF00';
  var CYAN = '#00FFFF';
  var YELLOW = '#FFD700';
  var PURPLE = '#9b59b6';
  var SKY_TOP = '#1a0a2e';
  var SKY_BOT = '#2d1b69';

  function init() {
    score = 0; lives = 3; speed = 3; frame = 0; gameOver = false; started = true;
    scrollX = 0;
    document.getElementById('jd-br-score').textContent = '0';
    document.getElementById('jd-br-lives').textContent = '3';
    player = { x: 60, y: GROUND_Y - 20, w: 20, h: 20, vy: 0, onGround: true, grinding: false, grindRail: null, invincible: 0 };
    obstacles = [];
    collectibles = [];
    rails = [];
    particles = [];
    buildings = [];
    // Seed initial buildings
    for (var i = 0; i < 10; i++) {
      buildings.push(makeBuilding(i * 80));
    }
    // Seed initial obstacles/collectibles
    spawnInitial();
    window.skateRunning = true;
    requestAnimationFrame(loop);
  }

  function makeBuilding(x) {
    var h = 40 + Math.random() * 80;
    var colors = ['#1a1a3e', '#2a1a4e', '#1a2a3e', '#2e1a2e', '#1a1a2a'];
    return { x: x, w: 30 + Math.random() * 40, h: h, color: colors[Math.floor(Math.random() * colors.length)] };
  }

  function spawnInitial() {
    for (var i = 0; i < 5; i++) {
      var sx = 300 + i * 150 + Math.random() * 80;
      spawnAt(sx);
    }
  }

  function spawnAt(sx) {
    var r = Math.random();
    if (r < 0.45) {
      // Obstacle
      var types = ['hydrant', 'trashcan', 'cone'];
      var type = types[Math.floor(Math.random() * types.length)];
      obstacles.push(makeObstacle(type, sx));
    } else if (r < 0.75) {
      // Collectible (tattoo machine)
      var cy = GROUND_Y - 40 - Math.random() * 30;
      collectibles.push({ x: sx, y: cy, w: 12, h: 16, collected: false });
    } else {
      // Grind rail
      var rw = 60 + Math.random() * 40;
      var ry = GROUND_Y - 30 - Math.random() * 20;
      rails.push({ x: sx, y: ry, w: rw, scored: false });
    }
  }

  function makeObstacle(type, x) {
    if (type === 'hydrant') return { type: 'hydrant', x: x, y: GROUND_Y - 18, w: 12, h: 18, color: '#FF3333' };
    if (type === 'trashcan') return { type: 'trashcan', x: x, y: GROUND_Y - 22, w: 16, h: 22, color: '#888' };
    return { type: 'cone', x: x, y: GROUND_Y - 14, w: 12, h: 14, color: YELLOW };
  }

  function spawnParticles(x, y, color, count) {
    for (var i = 0; i < count; i++) {
      particles.push({
        x: x, y: y,
        vx: (Math.random() - 0.5) * 4,
        vy: -Math.random() * 3 - 1,
        life: 20 + Math.random() * 15,
        color: color,
        size: 2 + Math.random() * 2
      });
    }
  }

  function jump() {
    if (gameOver) return;
    if (player.onGround || player.grinding) {
      player.vy = -10;
      player.onGround = false;
      if (player.grinding) {
        player.grinding = false;
        player.grindRail = null;
      }
    }
  }

  // Input
  document.addEventListener('keydown', function(e) {
    if (!window.skateRunning) return;
    if (e.code === 'Space' || e.key === ' ') {
      e.preventDefault();
      jump();
    }
  });
  canvas.addEventListener('click', function() {
    if (gameOver) { init(); return; }
    jump();
  });
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (gameOver) { init(); return; }
    jump();
  }, { passive: false });

  function update() {
    frame++;
    scrollX += speed;

    // Increase speed gradually, cap at 7
    if (frame % 300 === 0 && speed < 7) speed += 0.2;

    // Player physics
    if (!player.grinding) {
      player.vy += GRAVITY;
      player.y += player.vy;
    }

    // Ground collision
    if (player.y >= GROUND_Y - player.h) {
      player.y = GROUND_Y - player.h;
      player.vy = 0;
      if (!player.onGround) {
        // Landing particles
        spawnParticles(player.x + player.w / 2, GROUND_Y, ORANGE, 4);
      }
      player.onGround = true;
      player.grinding = false;
      player.grindRail = null;
    }

    // Invincibility timer
    if (player.invincible > 0) player.invincible--;

    // Rail grinding
    if (!player.onGround && player.vy > 0) {
      for (var i = 0; i < rails.length; i++) {
        var rail = rails[i];
        var rx = rail.x - scrollX;
        if (player.x + player.w > rx && player.x < rx + rail.w) {
          var railTop = rail.y;
          if (player.y + player.h >= railTop && player.y + player.h <= railTop + 8) {
            player.y = railTop - player.h;
            player.vy = 0;
            player.grinding = true;
            player.grindRail = rail;
            if (!rail.scored) {
              rail.scored = true;
              score += 25;
              document.getElementById('jd-br-score').textContent = score;
              spawnParticles(player.x + player.w / 2, railTop, CYAN, 8);
            }
            // Continuous grind sparks
            if (frame % 3 === 0) {
              spawnParticles(player.x + player.w / 2, railTop + 2, YELLOW, 1);
            }
            break;
          }
        }
      }
    }

    // Check if player fell off rail
    if (player.grinding && player.grindRail) {
      var grx = player.grindRail.x - scrollX;
      if (player.x > grx + player.grindRail.w || player.x + player.w < grx) {
        player.grinding = false;
        player.grindRail = null;
      }
    }

    // Obstacle collision
    for (var i = obstacles.length - 1; i >= 0; i--) {
      var ob = obstacles[i];
      var ox = ob.x - scrollX;
      if (ox < -50) { obstacles.splice(i, 1); continue; }
      if (player.invincible > 0) continue;
      // Collision check
      if (player.x + player.w - 4 > ox && player.x + 4 < ox + ob.w &&
          player.y + player.h > ob.y && player.y < ob.y + ob.h) {
        lives--;
        document.getElementById('jd-br-lives').textContent = lives;
        player.invincible = 90; // 1.5 seconds
        spawnParticles(ox + ob.w / 2, ob.y, '#FF0000', 10);
        obstacles.splice(i, 1);
        if (lives <= 0) {
          gameOver = true;
          return;
        }
      }
    }

    // Collectible collision
    for (var i = collectibles.length - 1; i >= 0; i--) {
      var col = collectibles[i];
      var cx = col.x - scrollX;
      if (cx < -50) { collectibles.splice(i, 1); continue; }
      if (col.collected) continue;
      if (player.x + player.w > cx && player.x < cx + col.w &&
          player.y + player.h > col.y && player.y < col.y + col.h) {
        col.collected = true;
        score += 10;
        document.getElementById('jd-br-score').textContent = score;
        spawnParticles(cx + col.w / 2, col.y + col.h / 2, LIME, 10);
      }
    }

    // Remove off-screen rails
    for (var i = rails.length - 1; i >= 0; i--) {
      if (rails[i].x - scrollX < -120) rails.splice(i, 1);
    }
    // Remove collected collectibles off screen
    for (var i = collectibles.length - 1; i >= 0; i--) {
      if (collectibles[i].collected && collectibles[i].x - scrollX < -50) collectibles.splice(i, 1);
    }

    // Spawn new stuff ahead
    var furthest = 0;
    for (var i = 0; i < obstacles.length; i++) { if (obstacles[i].x > furthest) furthest = obstacles[i].x; }
    for (var i = 0; i < collectibles.length; i++) { if (collectibles[i].x > furthest) furthest = collectibles[i].x; }
    for (var i = 0; i < rails.length; i++) { if (rails[i].x > furthest) furthest = rails[i].x; }
    while (furthest < scrollX + W + 400) {
      furthest += 120 + Math.random() * 100;
      spawnAt(furthest);
    }

    // Spawn buildings
    var lastB = buildings[buildings.length - 1];
    while (lastB.x - scrollX * 0.3 < W + 100) {
      var nb = makeBuilding(lastB.x + lastB.w + 5 + Math.random() * 15);
      buildings.push(nb);
      lastB = nb;
    }
    // Remove old buildings
    while (buildings.length > 0 && buildings[0].x + buildings[0].w - scrollX * 0.3 < -50) {
      buildings.shift();
    }

    // Update particles
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.15;
      p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function draw() {
    // Sky gradient
    var grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, SKY_TOP);
    grad.addColorStop(1, SKY_BOT);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Stars
    ctx.fillStyle = '#fff';
    for (var i = 0; i < 30; i++) {
      var sx = ((i * 137 + 50) % W + W) % W;
      var sy = ((i * 91 + 20) % (GROUND_Y - 80));
      var twinkle = Math.sin(frame * 0.05 + i) > 0.5 ? 2 : 1;
      ctx.fillRect(sx, sy, twinkle, twinkle);
    }

    // Buildings (parallax)
    for (var i = 0; i < buildings.length; i++) {
      var b = buildings[i];
      var bx = b.x - scrollX * 0.3;
      if (bx > W + 50 || bx + b.w < -50) continue;
      var by = GROUND_Y - b.h;
      ctx.fillStyle = b.color;
      ctx.fillRect(bx, by, b.w, b.h);
      // Windows
      ctx.fillStyle = (Math.sin(frame * 0.02 + i) > 0) ? '#FFFF66' : '#333';
      for (var wy = by + 6; wy < GROUND_Y - 10; wy += 12) {
        for (var wx = bx + 5; wx < bx + b.w - 5; wx += 10) {
          ctx.fillRect(wx, wy, 4, 4);
        }
      }
    }

    // Ground - sidewalk
    ctx.fillStyle = '#555';
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
    // Sidewalk lines
    ctx.fillStyle = '#666';
    ctx.fillRect(0, GROUND_Y, W, 2);
    // Dashes
    ctx.fillStyle = '#777';
    for (var i = 0; i < 20; i++) {
      var dx = (i * 40 - (scrollX % 40) + 800) % 800 - 400 + W;
      if (dx > W) dx -= 800;
      ctx.fillRect(dx, GROUND_Y + 15, 20, 2);
    }

    // Grind rails
    for (var i = 0; i < rails.length; i++) {
      var rail = rails[i];
      var rx = rail.x - scrollX;
      if (rx > W + 10 || rx + rail.w < -10) continue;
      // Rail posts
      ctx.fillStyle = '#888';
      ctx.fillRect(rx + 2, rail.y, 3, GROUND_Y - rail.y);
      ctx.fillRect(rx + rail.w - 5, rail.y, 3, GROUND_Y - rail.y);
      // Rail bar
      ctx.fillStyle = rail.scored ? CYAN : '#ccc';
      ctx.fillRect(rx, rail.y, rail.w, 3);
      // Highlight
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fillRect(rx, rail.y, rail.w, 1);
    }

    // Obstacles
    for (var i = 0; i < obstacles.length; i++) {
      var ob = obstacles[i];
      var ox = ob.x - scrollX;
      if (ox > W + 10 || ox + ob.w < -10) continue;
      drawObstacle(ob, ox);
    }

    // Collectibles (tattoo machines)
    for (var i = 0; i < collectibles.length; i++) {
      var col = collectibles[i];
      if (col.collected) continue;
      var cx = col.x - scrollX;
      if (cx > W + 10 || cx + col.w < -10) continue;
      drawTattooMachine(cx, col.y);
    }

    // Player (skateboarder)
    drawPlayer();

    // Particles
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.globalAlpha = p.life / 30;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, p.size, p.size);
    }
    ctx.globalAlpha = 1;

    // Score display on canvas
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('SCORE: ' + score, 8, 14);

    // Game over screen
    if (gameOver) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = ORANGE;
      ctx.font = 'bold 28px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W / 2, H / 2 - 30);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 18px monospace';
      ctx.fillText('Score: ' + score, W / 2, H / 2 + 5);
      ctx.fillStyle = YELLOW;
      ctx.font = '12px monospace';
      ctx.fillText('Click to play again', W / 2, H / 2 + 35);
    }

    // Start screen
    if (!started) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = ORANGE;
      ctx.font = 'bold 22px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('SK8 OR DIE', W / 2, H / 2 - 30);
      ctx.fillStyle = '#fff';
      ctx.font = '12px monospace';
      ctx.fillText('SPACE or TAP to ollie', W / 2, H / 2 + 10);
      ctx.fillStyle = YELLOW;
      ctx.fillText('Collect tattoo machines +10pts', W / 2, H / 2 + 30);
      ctx.fillStyle = CYAN;
      ctx.fillText('Grind rails +25pts', W / 2, H / 2 + 48);
    }
  }

  function drawPlayer() {
    var px = player.x, py = player.y;
    var blink = player.invincible > 0 && Math.floor(frame / 4) % 2 === 0;
    if (blink) return; // flash when invincible

    // Skateboard (board)
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(px - 2, py + 16, 24, 3);
    // Wheels
    ctx.fillStyle = YELLOW;
    ctx.fillRect(px, py + 19, 4, 3);
    ctx.fillRect(px + 16, py + 19, 4, 3);

    // Body (stick figure style with rectangles)
    ctx.fillStyle = ORANGE;
    // Torso
    ctx.fillRect(px + 8, py + 4, 4, 10);
    // Head
    ctx.fillRect(px + 6, py, 8, 6);
    // Arms
    if (player.onGround || player.grinding) {
      ctx.fillRect(px + 4, py + 6, 4, 3);
      ctx.fillRect(px + 12, py + 6, 4, 3);
    } else {
      // Arms up while jumping
      ctx.fillRect(px + 3, py + 2, 4, 3);
      ctx.fillRect(px + 13, py + 2, 4, 3);
    }
    // Legs
    ctx.fillRect(px + 6, py + 13, 3, 4);
    ctx.fillRect(px + 11, py + 13, 3, 4);

    // Hat/cap detail
    ctx.fillStyle = PINK;
    ctx.fillRect(px + 5, py, 10, 2);

    // Eye
    ctx.fillStyle = '#fff';
    ctx.fillRect(px + 11, py + 2, 2, 2);
  }

  function drawObstacle(ob, ox) {
    if (ob.type === 'hydrant') {
      // Fire hydrant
      ctx.fillStyle = '#FF3333';
      ctx.fillRect(ox + 2, ob.y + 4, 8, 14);
      ctx.fillRect(ox, ob.y + 6, 12, 4);
      ctx.fillRect(ox + 3, ob.y, 6, 5);
      // Cap
      ctx.fillStyle = '#CC0000';
      ctx.fillRect(ox + 4, ob.y, 4, 2);
    } else if (ob.type === 'trashcan') {
      // Trash can
      ctx.fillStyle = '#777';
      ctx.fillRect(ox + 1, ob.y + 3, 14, 19);
      ctx.fillStyle = '#999';
      ctx.fillRect(ox, ob.y, 16, 4);
      // Lines
      ctx.fillStyle = '#666';
      ctx.fillRect(ox + 1, ob.y + 10, 14, 1);
      ctx.fillRect(ox + 1, ob.y + 16, 14, 1);
    } else if (ob.type === 'cone') {
      // Traffic cone
      ctx.fillStyle = YELLOW;
      ctx.fillRect(ox + 1, ob.y + 10, 10, 4);
      ctx.fillRect(ox + 3, ob.y + 5, 6, 5);
      ctx.fillRect(ox + 4, ob.y, 4, 5);
      // Stripes
      ctx.fillStyle = '#fff';
      ctx.fillRect(ox + 2, ob.y + 7, 8, 2);
    }
  }

  function drawTattooMachine(cx, cy) {
    // Tattoo machine body
    ctx.fillStyle = PURPLE;
    ctx.fillRect(cx, cy + 2, 10, 10);
    // Grip
    ctx.fillStyle = '#8B5CF6';
    ctx.fillRect(cx + 2, cy + 12, 6, 4);
    // Needle
    ctx.fillStyle = '#ccc';
    ctx.fillRect(cx + 4, cy + 16, 2, 4);
    // Top coils
    ctx.fillStyle = PINK;
    ctx.fillRect(cx + 1, cy, 3, 3);
    ctx.fillRect(cx + 6, cy, 3, 3);
    // Bobbing glow
    if (Math.sin(frame * 0.1) > 0) {
      ctx.fillStyle = 'rgba(155, 89, 182, 0.3)';
      ctx.fillRect(cx - 2, cy - 2, 16, 24);
    }
  }

  function loop() {
    if (!window.skateRunning) return;
    if (started && !gameOver) update();
    draw();
    requestAnimationFrame(loop);
  }

  // Start when overlay opens
  var obs = new MutationObserver(function() {
    if (document.getElementById('jd-game-overlay').style.display === 'flex') init();
  });
  var overlay = document.getElementById('jd-game-overlay');
  if (overlay) obs.observe(overlay, { attributes: true, attributeFilter: ['style'] });
})();
</script>
