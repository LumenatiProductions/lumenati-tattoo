<!-- Clippy Easter Egg - Add via Code Injection (Footer) in Squarespace -->
<div id="clippy-container" aria-hidden="true">
  <div id="clippy-bubble">
    <div id="clippy-bubble-text">It looks like you're trying to get a tattoo! Would you like help?</div>
    <div id="clippy-buttons">
      <a href="/book" id="clippy-btn-book">Get Inked &rarr;</a>
      <button id="clippy-btn-dismiss">Go away</button>
    </div>
    <div id="clippy-bubble-tail"></div>
  </div>
  <div id="clippy-character">
    <img src="https://images.squarespace-cdn.com/content/60007bfc3f491826496124f4/e64042c5-f1a0-4370-b0a3-3706e10268c8/Clippy.webp?content-type=image%2Fwebp" alt="Clippy" id="clippy-img">
  </div>
</div>

<style>
  #clippy-container {
    position: fixed;
    bottom: 0;
    left: 24px;
    z-index: 999999;
    transform: translateY(200px);
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  #clippy-container.clippy-visible {
    transform: translateY(0);
  }

  #clippy-container.clippy-hiding {
    transform: translateY(200px);
    transition: transform 0.4s ease-in;
  }

  #clippy-bubble {
    position: relative;
    background: #FFFFCC;
    border: 2px solid #000;
    border-radius: 8px;
    padding: 14px 16px 12px;
    margin-bottom: 8px;
    max-width: 220px;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.15);
    opacity: 0;
    transform: scale(0.8);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  #clippy-container.clippy-visible #clippy-bubble {
    opacity: 1;
    transform: scale(1);
    transition-delay: 0.4s;
  }

  #clippy-bubble-tail {
    position: absolute;
    bottom: -10px;
    left: 24px;
    width: 0;
    height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 10px solid #000;
  }

  #clippy-bubble-tail::after {
    content: '';
    position: absolute;
    top: -12px;
    left: -8px;
    width: 0;
    height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 8px solid #FFFFCC;
  }

  #clippy-bubble-text {
    font-size: 13px;
    line-height: 1.4;
    color: #000;
    margin-bottom: 12px;
  }

  #clippy-buttons {
    display: flex;
    gap: 8px;
  }

  #clippy-btn-book {
    background: #222;
    color: #fff;
    border: none;
    padding: 6px 14px;
    border-radius: 3px;
    font-size: 12px;
    cursor: pointer;
    text-decoration: none;
    font-weight: 600;
    transition: background 0.2s;
  }

  #clippy-btn-book:hover {
    background: #444;
    color: #fff;
  }

  #clippy-btn-dismiss {
    background: transparent;
    color: #555;
    border: 1px solid #999;
    padding: 6px 12px;
    border-radius: 3px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  #clippy-btn-dismiss:hover {
    background: #eee;
    color: #000;
  }

  #clippy-character {
    animation: clippy-bob 3s ease-in-out infinite;
    cursor: pointer;
  }

  #clippy-img {
    display: block;
    width: 100px;
    height: auto;
    filter: drop-shadow(1px 1px 0 rgba(0,0,0,0.1));
  }

  @keyframes clippy-bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }


  @media (max-width: 640px) {
    #clippy-container { left: 12px; }
    #clippy-character { transform-origin: bottom left; scale: 0.75; }
    #clippy-bubble { max-width: 180px; padding: 10px 12px; }
    #clippy-bubble-text { font-size: 12px; }
    #clippy-buttons { flex-direction: column; gap: 6px; }
    #clippy-btn-book, #clippy-btn-dismiss { text-align: center; }
  }
</style>

<script>
  (function() {
    if (sessionStorage.getItem('clippy-dismissed')) return;
    var container = document.getElementById('clippy-container');
    var dismissBtn = document.getElementById('clippy-btn-dismiss');
    setTimeout(function() {
      container.classList.add('clippy-visible');
    }, 30000);
    dismissBtn.addEventListener('click', function() {
      container.classList.remove('clippy-visible');
      container.classList.add('clippy-hiding');
      sessionStorage.setItem('clippy-dismissed', '1');
      setTimeout(function() { container.style.display = 'none'; }, 500);
    });
  })();
</script>
